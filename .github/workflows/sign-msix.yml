name: Build & Sign MSIX

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/sign-msix.yml
      - package/**

jobs:
  build-sign:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate Windows SDK tools
        id: sdk
        shell: pwsh
        run: |
          $bin = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin' -Directory |
            Where-Object { $_.Name -match '^10\.' } | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $bin) { throw 'Windows 10 SDK not found' }
          $makeappx = Join-Path $bin.FullName 'x64\makeappx.exe'
          $signtool = Join-Path $bin.FullName 'x64\signtool.exe'
          if (-not (Test-Path $makeappx)) { throw "makeappx.exe not found at $makeappx" }
          if (-not (Test-Path $signtool)) { throw "signtool.exe not found at $signtool" }
          "makeappx=$makeappx" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          "signtool=$signtool" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "makeappx: $makeappx"
          Write-Host "signtool: $signtool"

      - name: Extract Publisher from AppxManifest
        id: pub
        shell: pwsh
        run: |
          $xml = [xml](Get-Content package/AppxManifest.xml -Raw)
          $publisher = $xml.Package.Identity.Publisher
          Write-Host "Publisher: $publisher"
          "publisher=$publisher" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Pack MSIX (regenerates AppxBlockMap.xml, standard MSIX compression)
        id: pack
        shell: pwsh
        run: |
          $here = (Get-Location).Path
          $msixPath = Join-Path $here 'MaxiCoastRush-Patched.msix'
          & '${{ steps.sdk.outputs.makeappx }}' pack /d package /p $msixPath /o
          if ($LASTEXITCODE -ne 0) { throw "makeappx pack failed ($LASTEXITCODE)" }
          Get-Item $msixPath | Select-Object Name, Length
          "msix_path=$msixPath" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Generate self-signed cert
        id: cert
        shell: pwsh
        run: |
          $subject = '${{ steps.pub.outputs.publisher }}'
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject $subject `
            -KeyUsage DigitalSignature `
            -FriendlyName 'MaxiCoastRush Self-Signed' `
            -CertStoreLocation 'Cert:\CurrentUser\My' `
            -TextExtension @('2.5.29.37={text}1.3.6.1.5.5.7.3.3', '2.5.29.19={text}') `
            -HashAlgorithm SHA256 `
            -NotAfter (Get-Date).AddYears(2)
          Write-Host "Thumbprint: $($cert.Thumbprint)"

          $here    = (Get-Location).Path
          $pfxPath = Join-Path $here 'cert.pfx'
          $cerPath = Join-Path $here 'MaxiCoastRush.cer'
          $storeRef = "Cert:\CurrentUser\My\$($cert.Thumbprint)"

          $pwdPlain = [guid]::NewGuid().ToString()
          $pwd = ConvertTo-SecureString -String $pwdPlain -Force -AsPlainText

          Export-PfxCertificate -Cert $storeRef -FilePath $pfxPath -Password $pwd | Out-Null
          Export-Certificate    -Cert $storeRef -FilePath $cerPath | Out-Null

          if (-not (Test-Path $pfxPath)) { throw "PFX not created at $pfxPath" }
          if (-not (Test-Path $cerPath)) { throw "CER not created at $cerPath" }

          "pfx_path=$pfxPath"       | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          "cer_path=$cerPath"       | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          "pfx_password=$pwdPlain"  | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Sign MSIX
        shell: pwsh
        run: |
          & '${{ steps.sdk.outputs.signtool }}' sign `
            /fd SHA256 `
            /f '${{ steps.cert.outputs.pfx_path }}' `
            /p '${{ steps.cert.outputs.pfx_password }}' `
            '${{ steps.pack.outputs.msix_path }}'
          if ($LASTEXITCODE -ne 0) { throw "signtool sign failed ($LASTEXITCODE)" }

      - name: Verify signature
        shell: pwsh
        run: |
          & '${{ steps.sdk.outputs.signtool }}' verify /pa /v '${{ steps.pack.outputs.msix_path }}'
          if ($LASTEXITCODE -ne 0) { throw "signtool verify failed ($LASTEXITCODE)" }

      - name: Upload signed MSIX
        uses: actions/upload-artifact@v4
        with:
          name: MaxiCoastRush-Patched-Signed
          path: MaxiCoastRush-Patched.msix

      - name: Upload public certificate
        uses: actions/upload-artifact@v4
        with:
          name: MaxiCoastRush-Certificate
          path: MaxiCoastRush.cer
